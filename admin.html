<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OPTIMUM Admin</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="section" style="padding-top:24px">
      <div class="container" style="max-width:980px">
        <div class="section-head">
          <h2>Admin <span class="offerings-accent">Dashboard</span></h2>
          <p>Manage recorded lectures</p>
        </div>

        <div class="card" style="margin-bottom:14px">
          <h3 style="margin-top:0">API Settings</h3>
          <div class="form" style="padding:0; max-width:680px">
            <details id="advanced" style="margin:0">
              <summary style="cursor:pointer; font-weight:900">Advanced</summary>
              <label style="margin-top:10px">
                <span>API Base URL</span>
                <input id="apiBase" type="text" placeholder="https://xxxxx.execute-api.ap-south-1.amazonaws.com" />
              </label>
            </details>
            <div style="display:flex; gap:10px; flex-wrap:wrap">
              <button id="save" class="btn btn-primary" type="button">Save & Load</button>
              <button id="logout" class="btn btn-ghost" type="button">Log out</button>
            </div>
            <p class="form-note" id="note" role="status" aria-live="polite"></p>
          </div>
        </div>

        <div class="cards" style="grid-template-columns:1fr;">
          <div class="card">
            <h3 style="margin-top:0">Create Lecture</h3>
            <form id="createForm" class="form" style="padding:0; max-width:680px">
              <label>
                <span>Class</span>
                <input name="class" required placeholder="10 / 11 / 12" />
              </label>
              <label>
                <span>Section</span>
                <input name="section" required placeholder="A" />
              </label>
              <label>
                <span>Subject</span>
                <input name="subject" required placeholder="Science" />
              </label>
              <label>
                <span>YouTube URL</span>
                <input name="youtubeUrl" required placeholder="https://youtu.be/..." />
              </label>
              <button class="btn btn-primary" type="submit">Create</button>
              <p class="form-note" id="createNote" role="status" aria-live="polite"></p>
            </form>
          </div>

          <div class="card">
            <h3 style="margin-top:0">Lectures</h3>
            <div class="form" style="padding:0">
              <div style="display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:10px; margin-bottom:10px">
                <label style="margin:0">
                  <span>Class</span>
                  <select id="filterClass">
                    <option value="">All</option>
                  </select>
                </label>
                <label style="margin:0">
                  <span>Section</span>
                  <select id="filterSection">
                    <option value="">All</option>
                  </select>
                </label>
                <label style="margin:0">
                  <span>Subject</span>
                  <select id="filterSubject">
                    <option value="">All</option>
                  </select>
                </label>
              </div>

              <div style="display:flex; gap:10px; flex-wrap:wrap">
                <button id="applyFilters" class="btn btn-primary" type="button">Apply filters</button>
                <button id="clearFilters" class="btn btn-ghost" type="button">Clear</button>
                <button id="refresh" class="btn btn-ghost" type="button">Refresh</button>
              </div>
            </div>
            <div id="list" style="display:grid; gap:10px; margin-top:12px"></div>
          </div>
        </div>
      </div>
    </main>

    <script>
      const qs = (s, el = document) => el.querySelector(s);

      const DEFAULT_API_BASE = 'https://3fhqqpu0di.execute-api.ap-south-1.amazonaws.com';

      const storageKey = 'optimum_admin_cfg_v1';

      function b64(s) {
        return btoa(unescape(encodeURIComponent(s)));
      }

      function getCfg() {
        try {
          return JSON.parse(localStorage.getItem(storageKey) || '{}');
        } catch {
          return {};
        }
      }

      function setCfg(cfg) {
        localStorage.setItem(storageKey, JSON.stringify(cfg));
      }

      function authHeader(cfg) {
        const token = b64(`${cfg.user || ''}:${cfg.pass || ''}`);
        return `Basic ${token}`;
      }

      function apiUrl(cfg, path) {
        const base = String(cfg.apiBase || '').replace(/\/+$|\s+$/g, '');
        return `${base}${path}`;
      }

      function uniqSorted(arr) {
        const s = new Set(arr.filter((x) => x !== null && x !== undefined && String(x).trim() !== '').map((x) => String(x).trim()));
        return Array.from(s).sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));
      }

      function setSelectOptions(selectEl, values) {
        if (!selectEl) return;
        const keep = selectEl.value;
        selectEl.innerHTML = '<option value="">All</option>';
        values.forEach((v) => {
          const opt = document.createElement('option');
          opt.value = v;
          opt.textContent = v;
          selectEl.appendChild(opt);
        });
        if (values.includes(keep)) selectEl.value = keep;
      }

      function getFilters() {
        return {
          class: qs('#filterClass')?.value || '',
          section: qs('#filterSection')?.value || '',
          subject: qs('#filterSubject')?.value || '',
        };
      }

      function filterItems(items, filters) {
        const fc = String(filters.class || '').trim();
        const fs = String(filters.section || '').trim().toLowerCase();
        const fsub = String(filters.subject || '').trim().toLowerCase();

        return items.filter((it) => {
          if (fc && String(it.class || '').trim() !== fc) return false;
          if (fs && String(it.section || '').trim().toLowerCase() !== fs) return false;
          if (fsub && String(it.subject || '').trim().toLowerCase() !== fsub) return false;
          return true;
        });
      }

      function renderList(items) {
        const list = qs('#list');
        if (!list) return;
        list.innerHTML = '';

        items.forEach((item) => {
          const row = document.createElement('div');
          row.className = 'info-item';
          row.style.gridTemplateColumns = '1fr auto';
          row.innerHTML = `
            <div>
              <div style="font-weight:900">Class ${item.class} • ${item.section} • ${item.subject}</div>
              <div class="muted" style="font-size:12px; margin-top:4px; word-break:break-all">${item.youtubeUrl}</div>
              <div class="muted" style="font-size:12px; margin-top:4px">${item.createdAt || ''}</div>
            </div>
            <div style="display:flex; gap:10px; align-items:center; justify-content:flex-end">
              <button class="btn btn-ghost" type="button" data-del="${item.id}">Delete</button>
            </div>
          `;
          list.appendChild(row);
        });

        list.querySelectorAll('[data-del]').forEach((btn) => {
          btn.addEventListener('click', async () => {
            const id = btn.getAttribute('data-del');
            if (!id) return;
            if (!confirm('Delete this lecture?')) return;

            const cfg2 = getCfg();
            const res2 = await fetch(apiUrl(cfg2, `/admin/lectures/${id}`), {
              method: 'DELETE',
              headers: {
                Authorization: authHeader(cfg2),
              },
            });

            if (!res2.ok) {
              const txt = await res2.text();
              qs('#note').textContent = `Delete failed: ${res2.status} ${txt}`;
              return;
            }

            await loadList({ force: true });
          });
        });
      }

      async function loadList({ force = false } = {}) {
        const cfg = getCfg();
        const note = qs('#note');

        if (!cfg.apiBase) {
          note.textContent = 'Set API base URL first.';
          return;
        }

        if (!force && Array.isArray(window.__lecturesCache)) {
          const filters = getFilters();
          const filtered = filterItems(window.__lecturesCache, filters);
          note.textContent = `Loaded ${filtered.length} lectures.`;
          renderList(filtered);
          return;
        }

        note.textContent = 'Loading…';
        renderList([]);

        const res = await fetch(apiUrl(cfg, '/admin/lectures'), {
          headers: {
            Authorization: authHeader(cfg),
          },
        });

        if (!res.ok) {
          const txt = await res.text();
          note.textContent = `Failed: ${res.status} ${txt}`;
          return;
        }

        const data = await res.json();
        const items = Array.isArray(data?.items) ? data.items : [];
        window.__lecturesCache = items;

        setSelectOptions(qs('#filterClass'), uniqSorted(items.map((x) => x.class)));
        setSelectOptions(qs('#filterSection'), uniqSorted(items.map((x) => x.section)));
        setSelectOptions(qs('#filterSubject'), uniqSorted(items.map((x) => x.subject)));

        const filters = getFilters();
        const filtered = filterItems(items, filters);
        note.textContent = `Loaded ${filtered.length} lectures.`;
        renderList(filtered);
      }

      (function init() {
        const cfg = getCfg();
        const base = cfg.apiBase || DEFAULT_API_BASE;
        if (qs('#apiBase')) qs('#apiBase').value = base;
        if (!cfg.apiBase) setCfg({ ...cfg, apiBase: base });

        if (!cfg.user || !cfg.pass) {
          qs('#note').textContent = 'Not logged in. Go back and open Dashboard again.';
        }

        qs('#save').addEventListener('click', async () => {
          const prev = getCfg();
          const advancedOpen = !!qs('#advanced')?.open;
          const nextBase = advancedOpen ? qs('#apiBase')?.value.trim() : (prev.apiBase || DEFAULT_API_BASE);
          setCfg({
            ...prev,
            apiBase: nextBase,
          });
          await loadList();
        });

        qs('#logout').addEventListener('click', () => {
          localStorage.removeItem(storageKey);
          window.location.href = 'index.html';
        });

        qs('#refresh').addEventListener('click', () => loadList({ force: true }));
        qs('#applyFilters').addEventListener('click', () => loadList({ force: false }));
        qs('#clearFilters').addEventListener('click', () => {
          if (qs('#filterClass')) qs('#filterClass').value = '';
          if (qs('#filterSection')) qs('#filterSection').value = '';
          if (qs('#filterSubject')) qs('#filterSubject').value = '';
          loadList({ force: false });
        });

        qs('#createForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const cfg2 = getCfg();
          const note = qs('#createNote');
          note.textContent = 'Creating…';

          const fd = new FormData(e.target);
          const payload = Object.fromEntries(fd.entries());

          const res = await fetch(apiUrl(cfg2, '/admin/lectures'), {
            method: 'POST',
            headers: {
              'content-type': 'application/json',
              Authorization: authHeader(cfg2),
            },
            body: JSON.stringify(payload),
          });

          if (!res.ok) {
            const txt = await res.text();
            note.textContent = `Failed: ${res.status} ${txt}`;
            return;
          }

          note.textContent = 'Created.';
          e.target.reset();
          await loadList({ force: true });
        });
      })();
    </script>
  </body>
</html>
